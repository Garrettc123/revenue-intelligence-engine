name: RHNS Revenue Intelligence Cycle

on:
  schedule:
    - cron: "0 * * * *"   # Every hour
  workflow_dispatch:
    inputs:
      debug:
        description: 'Enable debug output'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  intelligence-cycle:
    name: Revenue Intelligence Cycle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      
      - name: Install dependencies
        run: pip install requests
      
      - name: Run RHNS Revenue Intelligence
        env:
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          HUBSPOT_API_KEY: ${{ secrets.HUBSPOT_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.DEFENDER_SLACK_WEBHOOK }}
          LINEAR_API_KEY: ${{ secrets.LINEAR_API_KEY }}
        run: python engine.py
      
      - name: Commit intelligence output
        run: |
          git config user.name 'RHNS Revenue Engine'
          git config user.email 'rhns@garcar.ai'
          git add output/ || true
          git diff --staged --quiet || git commit -m "chore: revenue intelligence cycle $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push || echo 'Nothing to push'
      
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: intelligence-output-${{ github.run_id }}
          path: output/
          retention-days: 30
